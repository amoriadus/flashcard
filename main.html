<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flashcard N5 — Kotoba</title>
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root{
    --bg:#fff; --bg2:#f5f5f3; --bg3:#eeecea;
    --text:#1a1a18; --text2:#6b6b67; --text3:#a0a09c;
    --border:rgba(0,0,0,.12); --border2:rgba(0,0,0,.22);
    --radius:8px; --radius-lg:14px;
    --accent:#639922; --accent-text:#27500A;
    --lupa:#E24B4A; --sulit:#D98324; --ingat:#3E7CB1; --mudah:#639922;
    --geser:#27500A; --patuh:#5B3A7E; --khusus:#8A4A1E; --iadj:#3E7CB1; --naadj:#B5651D;
    --ok:#639922; --no:#E24B4A; --lock:#a0a09c;
  }
  @media (prefers-color-scheme:dark){ :root{
    --bg:#1e1e1c; --bg2:#272725; --bg3:#2f2f2c;
    --text:#f0ede8; --text2:#a0a09c; --text3:#6b6b67;
    --border:rgba(255,255,255,.14); --border2:rgba(255,255,255,.26);
    --accent:#7CB342; --accent-text:#C5E1A5;
    --lupa:#E57373; --sulit:#E0A458; --ingat:#7FB2D9; --mudah:#9CCC65;
    --geser:#9CCC65; --patuh:#B39DDB; --khusus:#FFB74D; --iadj:#7FB2D9; --naadj:#E0A458; --ok:#9CCC65; --no:#E57373;
  }}
  body{ background:var(--bg); color:var(--text); line-height:1.5; -webkit-font-smoothing:antialiased;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; padding:14px 14px 40px; }
  .wrap{ max-width:560px; margin:0 auto; }
  .jp{ font-family:"Hiragino Mincho ProN","Yu Mincho","Yu Gothic",serif; }
  .mono{ font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
  h1{ font-size:19px; font-weight:700; letter-spacing:-.01em; }
  .sub{ font-size:12px; color:var(--text3); margin:2px 0 14px; }
  .hidden{ display:none !important; }

  .seg{ display:flex; gap:6px; background:var(--bg2); border:1px solid var(--border); border-radius:999px; padding:4px; margin-bottom:14px; }
  .seg button{ flex:1; border:none; background:transparent; color:var(--text2); border-radius:999px; padding:9px; font-size:14px; font-weight:600; cursor:pointer; transition:.12s; }
  .seg button.active{ background:var(--bg); color:var(--text); box-shadow:0 1px 3px rgba(0,0,0,.08); }
  @media (prefers-color-scheme:dark){ .seg button.active{ background:var(--bg3); } }
  .seg.sm button{ padding:7px; font-size:13px; }

  .deck-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(96px,1fr)); gap:8px; margin-bottom:16px; }
  .deck-btn{ border:1px solid var(--border); background:var(--bg2); color:var(--text); border-radius:var(--radius); padding:12px 8px; cursor:pointer; text-align:center; font-size:13px; font-weight:600; transition:.12s; }
  .deck-btn:hover:not(:disabled){ border-color:var(--border2); }
  .deck-btn.active{ border-color:var(--accent); background:var(--bg3); box-shadow:inset 0 0 0 1px var(--accent); }
  .deck-btn:disabled{ opacity:.42; cursor:not-allowed; }
  .deck-btn small{ display:block; font-weight:400; font-size:10px; color:var(--text3); margin-top:3px; }

  .grup-head{ display:flex; justify-content:space-between; align-items:center; margin:4px 0 10px; }
  .grup-head .h{ font-size:14px; font-weight:600; }
  .grup-head .helpers button{ border:none; background:transparent; color:var(--accent); font-size:12px; font-weight:600; cursor:pointer; padding:4px 6px; }
  .chips{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
  .chip{ border:1px solid var(--border); background:var(--bg2); color:var(--text2); border-radius:999px; padding:8px 12px; font-size:13px; cursor:pointer; transition:.1s; }
  .chip.on{ background:var(--bg3); color:var(--text); border-color:var(--accent); box-shadow:inset 0 0 0 1px var(--accent); }
  .chip .n{ color:var(--text3); font-size:11px; margin-left:5px; }
  .start-btn{ width:100%; border:1px solid var(--accent); background:var(--accent); color:#fff; border-radius:var(--radius); padding:14px; font-size:15px; font-weight:700; cursor:pointer; transition:.1s; }
  .start-btn:disabled{ cursor:not-allowed; background:var(--bg3); color:var(--text3); border-color:var(--border); }
  .warn{ font-size:12px; color:var(--sulit); text-align:center; margin-top:8px; }
  .best-line{ font-size:12px; color:var(--text2); text-align:center; margin:2px 0 12px; }
  .best-line b{ color:var(--accent); }

  .sesi-top{ display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .back-btn{ border:1px solid var(--border); background:var(--bg2); color:var(--text2); border-radius:var(--radius); padding:6px 10px; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; }
  .sesi-top .status{ flex:1; display:flex; justify-content:space-between; align-items:center; font-size:12px; color:var(--text2); }
  .status b{ color:var(--text); }
  .streak{ display:flex; gap:5px; align-items:center; font-weight:600; }
  .pips{ display:flex; gap:3px; }
  .pip{ width:9px; height:9px; border-radius:50%; background:var(--bg3); border:1px solid var(--border); }
  .pip.on{ background:var(--mudah); border-color:var(--mudah); }

  .card{ border:1px solid var(--border); background:var(--bg2); border-radius:var(--radius-lg); min-height:236px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:28px 20px; text-align:center; cursor:pointer; user-select:none; position:relative; }
  .card .hint{ position:absolute; top:12px; font-size:11px; color:var(--text3); }
  .front-main{ font-size:56px; font-weight:600; letter-spacing:.02em; line-height:1.15; }
  .reading{ font-size:26px; color:var(--text); margin-bottom:2px; }
  .romaji{ font-size:14px; color:var(--text3); margin-bottom:14px; }
  .arti{ font-size:20px; font-weight:600; }
  .petunjuk{ font-size:13px; color:var(--text2); margin-top:8px; }
  .badge{ display:inline-block; margin-top:14px; font-size:11px; font-weight:700; padding:3px 10px; border-radius:999px; border:1px solid currentColor; }
  .badge.geser{ color:var(--geser); } .badge.patuh{ color:var(--patuh); } .badge.khusus{ color:var(--khusus); } .badge.iadj{ color:var(--iadj); } .badge.naadj{ color:var(--naadj); }

  .rate{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:14px; }
  .rate button{ border:none; border-radius:var(--radius); padding:13px 4px; cursor:pointer; font-size:13px; font-weight:700; color:#fff; transition:.1s; }
  .rate button:active{ transform:translateY(1px); }
  .rate button:disabled{ opacity:.35; cursor:not-allowed; }
  .r-lupa{background:var(--lupa)} .r-sulit{background:var(--sulit)} .r-ingat{background:var(--ingat)} .r-mudah{background:var(--mudah)}
  .rate button small{ display:block; font-weight:400; font-size:10px; opacity:.85; margin-top:1px; }
  .grad-row{ margin-top:8px; }
  .grad{ width:100%; border:1px dashed var(--border2); background:transparent; color:var(--lock); border-radius:var(--radius); padding:11px; font-size:13px; font-weight:600; cursor:not-allowed; }
  .grad.ready{ border-style:solid; border-color:var(--accent); color:var(--accent); background:var(--bg3); cursor:pointer; }
  .tap-hint{ text-align:center; font-size:11px; color:var(--text3); margin-top:10px; height:14px; }

  .msg{ text-align:center; padding:36px 16px; color:var(--text2); }
  .msg .big{ font-size:40px; margin-bottom:8px; }
  .btn-main{ border:1px solid var(--accent); background:var(--bg3); color:var(--accent-text); border-radius:var(--radius); padding:10px 18px; font-size:14px; font-weight:600; cursor:pointer; margin:14px 6px 0; }

  /* Kuis */
  .qz-prompt{ border:1px solid var(--border); background:var(--bg2); border-radius:var(--radius-lg); padding:26px 20px; text-align:center; margin-bottom:14px; }
  .qz-tipe{ font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--text3); margin-bottom:10px; }
  .qz-word{ font-size:48px; font-weight:600; line-height:1.15; }
  .qz-word .r{ display:block; font-size:16px; color:var(--text3); margin-top:6px; }
  .qz-input{ width:100%; border:1px solid var(--border2); background:var(--bg); color:var(--text); border-radius:var(--radius); padding:13px; font-size:22px; text-align:center; }
  .qz-input:focus{ outline:none; border-color:var(--accent); }
  .qz-opts{ display:grid; gap:8px; }
  .qz-opt{ border:1px solid var(--border); background:var(--bg2); color:var(--text); border-radius:var(--radius); padding:13px; font-size:15px; font-weight:600; cursor:pointer; text-align:left; transition:.1s; }
  .qz-opt:hover:not(:disabled){ border-color:var(--border2); }
  .qz-opt:disabled{ cursor:default; }
  .qz-opt.ok{ border-color:var(--ok); background:var(--bg3); box-shadow:inset 0 0 0 1px var(--ok); }
  .qz-opt.no{ border-color:var(--no); background:var(--bg3); box-shadow:inset 0 0 0 1px var(--no); }
  .qz-cek{ width:100%; border:none; background:var(--accent); color:#fff; border-radius:var(--radius); padding:13px; font-size:15px; font-weight:700; cursor:pointer; margin-top:10px; }
  .qz-fb{ margin-top:12px; padding:12px; border-radius:var(--radius); font-size:14px; text-align:center; }
  .qz-fb.ok{ background:color-mix(in srgb,var(--ok) 16%,transparent); color:var(--ok); }
  .qz-fb.no{ background:color-mix(in srgb,var(--no) 16%,transparent); color:var(--no); }
  .qz-fb b{ color:var(--text); }
  .qz-next{ width:100%; border:none; background:var(--text); color:var(--bg); border-radius:var(--radius); padding:12px; font-size:14px; font-weight:700; cursor:pointer; margin-top:10px; }
  .qz-timer{ font-variant-numeric:tabular-nums; }
  .score-big{ font-size:52px; font-weight:800; letter-spacing:-.02em; }
  .score-sub{ font-size:14px; color:var(--text2); }
  .rekor{ display:inline-block; margin-top:8px; font-size:12px; font-weight:700; color:var(--accent); border:1px solid currentColor; border-radius:999px; padding:2px 12px; }
  .review{ text-align:left; margin-top:20px; }
  .review h4{ font-size:13px; color:var(--text2); margin-bottom:8px; }
  .review .item{ border:1px solid var(--border); border-radius:var(--radius); padding:10px 12px; margin-bottom:6px; font-size:13px; }
  .review .item .w{ font-size:18px; font-weight:600; }
  .review .item .c{ color:var(--ok); } .review .item .u{ color:var(--no); text-decoration:line-through; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Flashcard N5 <span class="jp">言葉</span></h1>
  <p class="sub">Hafal per sesi &middot; kuis baca &amp; arti</p>

  <div class="seg" id="modeNav">
    <button data-mode="flash" class="active">Flashcard</button>
    <button data-mode="kuis">Kuis</button>
  </div>

  <!-- ============ FLASHCARD ============ -->
  <div id="modeFlash">
    <div class="deck-grid" id="deckGrid"></div>
    <div id="grupPick">
      <div class="grup-head">
        <span class="h" id="grupTitle">Pilih grup</span>
        <span class="helpers"><button id="selAll">Semua</button><button id="selNone">Kosongkan</button></span>
      </div>
      <div class="chips" id="chips"></div>
      <button class="start-btn" id="startBtn">Mulai sesi</button>
      <div class="warn hidden" id="warn"></div>
    </div>
    <div id="session" class="hidden">
      <div class="sesi-top">
        <button class="back-btn" id="backBtn">&larr; Ganti grup</button>
        <div class="status"><div>Antrean: <b id="qCount">0</b> &middot; Lulus: <b id="gCount">0</b></div>
        <div class="streak" id="streakBox"></div></div>
      </div>
      <div class="card" id="card"></div>
      <div class="tap-hint" id="tapHint">Ketuk kartu untuk lihat jawaban</div>
      <div class="rate" id="rateRow">
        <button class="r-lupa" data-lv="lupa" disabled>Lupa<small>~depan</small></button>
        <button class="r-sulit" data-lv="sulit" disabled>Sulit<small>agak depan</small></button>
        <button class="r-ingat" data-lv="ingat" disabled>Ingat<small>agak belakang</small></button>
        <button class="r-mudah" data-lv="mudah" disabled>Mudah<small>+1 beruntun</small></button>
      </div>
      <div class="grad-row"><button class="grad" id="gradBtn" disabled>🔒 Keluarkan — terkunci (Mudah 0/4)</button></div>
    </div>
    <div id="done" class="msg hidden">
      <div class="big">✓</div>
      <div>Semua kartu grup terpilih sudah kamu keluarkan.<br>Sesi selesai.</div>
      <div><button class="btn-main" id="restart">Ulang sesi ini</button><button class="btn-main" id="backDone">Ganti grup</button></div>
    </div>
  </div>

  <!-- ============ KUIS ============ -->
  <div id="modeKuis" class="hidden">
    <!-- setup -->
    <div id="qzSetup">
      <div class="deck-grid" id="qzDeckGrid"></div>
      <div class="seg sm" id="qzModeNav">
        <button data-m="santai" class="active">Santai</button>
        <button data-m="ujian">Ujian ⏱</button>
      </div>
      <div class="seg sm" id="qzJenisNav">
        <button data-j="baca">Baca</button>
        <button data-j="arti">Arti</button>
        <button data-j="campur" class="active">Campur</button>
      </div>
      <div class="grup-head">
        <span class="h" id="qzGrupTitle">Pilih grup</span>
        <span class="helpers"><button id="qzSelAll">Semua</button><button id="qzSelNone">Kosongkan</button></span>
      </div>
      <div class="chips" id="qzChips"></div>
      <div class="best-line" id="qzBest"></div>
      <button class="start-btn" id="qzStart">Mulai kuis</button>
    </div>
    <!-- main -->
    <div id="qzMain" class="hidden">
      <div class="sesi-top">
        <button class="back-btn" id="qzBack">&larr; Keluar</button>
        <div class="status"><div>Soal <b id="qzProg">0/0</b> &middot; Benar <b id="qzScore">0</b></div>
        <div class="streak qz-timer" id="qzTimer"></div></div>
      </div>
      <div id="qzQ"></div>
    </div>
    <!-- done -->
    <div id="qzDone" class="msg hidden"></div>
  </div>
</div>

const TARGET_BERUNTUN=4, AMBANG_BERAT=30;
const $ = id => document.getElementById(id);
function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

/* ---------- MESIN FLASHCARD ---------- */
const PCT={lupa:0.15,sulit:0.35,ingat:0.70};
function computeInsertIndex(level,N){ if(N===0)return 0; if(level==='mudah')return N; return Math.max(1,Math.min(Math.round(PCT[level]*N),N)); }
const S={ mode:'flash', view:'grup', deckKey:null, selected:new Set(), queue:[], revealed:false, graduated:0 };
function terpilih(){ const d=DECKS[S.deckKey]; return d.data.filter(it=>S.selected.has(d.grupOf(it))); }
function pilihDeck(key){ S.deckKey=key; const d=DECKS[key]; if(d.grups){ S.selected=new Set(d.grups.map((_,i)=>i)); S.view='grup'; } else { S.selected=new Set([0]); mulaiSesi(); return; } render(); }
function mulaiSesi(){ const d=DECKS[S.deckKey]; S.queue=shuffle(terpilih()).map(it=>({card:d.toCard(it),streak:0})); S.graduated=0; S.revealed=false; S.view='sesi'; render(); }
function rate(level){ if(S.view!=='sesi'||!S.revealed)return; const it=S.queue.shift(); it.streak=(level==='mudah')?it.streak+1:0; S.queue.splice(computeInsertIndex(level,S.queue.length),0,it); S.revealed=false; render(); }
function keluarkan(){ const f=S.queue[0]; if(!f||f.streak<TARGET_BERUNTUN)return; S.queue.shift(); S.graduated++; S.revealed=false; render(); }

function renderDeckButtons(gridId,onPick,activeKey){
  const g=$(gridId); g.innerHTML='';
  Object.entries(DECKS).forEach(([key,d])=>{ const b=document.createElement('button');
    b.className='deck-btn'+(key===activeKey?' active':''); b.disabled=d.data.length===0;
    b.innerHTML=d.label+'<small>'+(d.data.length?d.data.length+' kartu':'segera')+'</small>';
    b.onclick=()=>onPick(key); g.appendChild(b); });
}
function renderChips(){
  const d=DECKS[S.deckKey]; $('grupTitle').textContent='Pilih grup — '+d.label;
  const c=$('chips'); c.innerHTML='';
  (d.grups||[]).forEach((nama,i)=>{ const jml=d.data.filter(v=>d.grupOf(v)===i).length; const b=document.createElement('button');
    b.className='chip'+(S.selected.has(i)?' on':''); b.innerHTML=nama+'<span class="n">'+jml+'</span>';
    b.onclick=()=>{ S.selected.has(i)?S.selected.delete(i):S.selected.add(i); render(); }; c.appendChild(b); });
  const n=terpilih().length, sb=$('startBtn'); sb.disabled=n===0;
  sb.textContent=n===0?'Pilih minimal satu grup':'Mulai sesi ('+n+' kartu)';
  const w=$('warn'); if(n>AMBANG_BERAT){ w.classList.remove('hidden'); w.textContent=n+' kartu — tiap kartu butuh 4× Mudah, lumayan berat. Tetap boleh jalan.'; } else w.classList.add('hidden');
}
function render(){
  $('modeFlash').classList.toggle('hidden',S.mode!=='flash');
  $('modeKuis').classList.toggle('hidden',S.mode!=='kuis');
  if(S.mode==='kuis'){ renderKuis(); return; }
  renderDeckButtons('deckGrid',pilihDeck,S.deckKey);
  const inGrup=S.view==='grup', inSesi=S.view==='sesi'&&S.queue.length>0, inDone=S.view==='sesi'&&S.queue.length===0&&S.graduated>0;
  $('grupPick').classList.toggle('hidden',!inGrup);
  $('session').classList.toggle('hidden',!inSesi);
  $('done').classList.toggle('hidden',!inDone);
  if(inGrup){ renderChips(); return; }
  if(!inSesi) return;
  const it=S.queue[0], c=it.card;
  $('qCount').textContent=S.queue.length; $('gCount').textContent=S.graduated;
  const shown=Math.min(it.streak,TARGET_BERUNTUN);
  $('streakBox').innerHTML='Mudah '+shown+'/'+TARGET_BERUNTUN+' <span class="pips">'+Array.from({length:TARGET_BERUNTUN},(_,i)=>'<span class="pip'+(i<shown?' on':'')+'"></span>').join('')+'</span>';
  const card=$('card');
  if(!S.revealed){ card.innerHTML='<span class="hint">depan</span><div class="front-main jp">'+c.front+'</div>'; }
  else { let h='<span class="hint">belakang</span>'; if(c.reading)h+='<div class="reading jp">'+c.reading+'</div>';
    h+='<div class="romaji mono">'+c.romaji+'</div><div class="arti">'+c.arti+'</div>';
    if(c.petunjuk)h+='<div class="petunjuk jp">'+c.petunjuk+'</div>'; if(c.tipe)h+='<div class="badge '+c.tipe.cls+'">'+c.tipe.label+'</div>'; card.innerHTML=h; }
  $('tapHint').textContent=S.revealed?'':'Ketuk kartu untuk lihat jawaban';
  document.querySelectorAll('#rateRow button').forEach(b=>b.disabled=!S.revealed);
  const gb=$('gradBtn'), ready=it.streak>=TARGET_BERUNTUN; gb.disabled=!ready; gb.classList.toggle('ready',ready);
  gb.textContent=ready?'✅ Keluarkan kartu ini dari sesi':'🔒 Keluarkan — terkunci (Mudah '+shown+'/'+TARGET_BERUNTUN+')';
}

/* ---------- MESIN KUIS ---------- */
const Q={ mode:'santai', jenis:'campur', view:'setup', deckKey:'verb', selected:new Set(),
  questions:[], idx:0, wrong:[], correct:0, startTime:0, timer:null, answered:false };

function norm(s){ return (s||'').trim().toLowerCase().replace(/\s+/g,'').replace(/[。、.．]/g,''); }
function cekBaca(input,c){ const n=norm(input); if(!n)return false; const ks=String(c.kana).split('・').map(norm); const rs=String(c.romaji).split('・').map(norm); return ks.includes(n)||rs.includes(n); }
function mcOptions(c,pool){ const others=shuffle(pool.filter(p=>p.arti!==c.arti).map(p=>p.arti)); const uniq=[];
  for(const a of others){ if(!uniq.includes(a)){ uniq.push(a); if(uniq.length===3)break; } } return shuffle([c.arti,...uniq]); }
function qzTerpilih(){ const d=DECKS[Q.deckKey]; return d.data.filter(it=>Q.selected.has(d.grupOf(it))); }
function qzJumlahSoal(){ const d=DECKS[Q.deckKey]; let n=0; qzTerpilih().map(d.toQuiz).forEach(c=>{ if(Q.jenis!=='arti'&&c.front!==c.kana)n++; if(Q.jenis!=='baca')n++; }); return n; }

function buildQuiz(){
  const d=DECKS[Q.deckKey]; const pool=d.data.map(d.toQuiz);
  const chosen=qzTerpilih().map(d.toQuiz); const qs=[];
  chosen.forEach(c=>{ if(Q.jenis!=='arti'&&c.front!==c.kana) qs.push({type:'baca',c}); if(Q.jenis!=='baca') qs.push({type:'arti',c,options:mcOptions(c,pool)}); });
  Q.questions=shuffle(qs); Q.idx=0; Q.wrong=[]; Q.correct=0; Q.answered=false;
}
function mulaiKuis(){ if(qzJumlahSoal()===0)return; buildQuiz(); Q.view='main'; Q.startTime=Date.now();
  if(Q.mode==='ujian'){ Q.timer=setInterval(tickTimer,250); } renderKuis(); }
function tickTimer(){ const el=$('qzTimer'); if(el) el.textContent='⏱ '+fmtTime(Date.now()-Q.startTime); }
function fmtTime(ms){ const s=Math.floor(ms/1000); return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }

function jawab(benar,userAns){
  if(Q.answered)return; Q.answered=true; const q=Q.questions[Q.idx];
  if(benar) Q.correct++; else Q.wrong.push({q,userAns});
  q._benar=benar; q._user=userAns; renderKuis();
}
function lanjut(){ Q.answered=false; Q.idx++; if(Q.idx>=Q.questions.length) selesaiKuis(); else renderKuis(); }
function selesaiKuis(){ if(Q.timer){ clearInterval(Q.timer); Q.timer=null; } Q.view='done';
  const total=Q.questions.length, pct=total?Math.round(Q.correct/total*100):0, secs=Math.round((Date.now()-Q.startTime)/1000);
  const rec={pct,correct:Q.correct,total,seconds:secs,mode:Q.mode,jenis:Q.jenis};
  const old=getBest(Q.deckKey,Q.mode); Q._rekorBaru=isBetter(rec,old); if(Q._rekorBaru) setBest(Q.deckKey,Q.mode,rec);
  Q._hasil=rec; Q._best=Q._rekorBaru?rec:old; renderKuis(); }

function bestKey(deck,mode){ return 'kotoba_best_'+deck+'_'+mode; }
function getBest(deck,mode){ try{ const r=localStorage.getItem(bestKey(deck,mode)); return r?JSON.parse(r):null; }catch(e){ return null; } }
function setBest(deck,mode,rec){ try{ localStorage.setItem(bestKey(deck,mode),JSON.stringify(rec)); }catch(e){} }
function isBetter(n,o){ if(!o)return true; if(n.pct>o.pct)return true; if(n.pct===o.pct&&n.mode==='ujian'&&n.seconds<o.seconds)return true; return false; }

function qzRenderChips(){
  const d=DECKS[Q.deckKey]; $('qzGrupTitle').textContent='Pilih grup — '+d.label;
  const c=$('qzChips'); c.innerHTML='';
  (d.grups||[]).forEach((nama,i)=>{ const jml=d.data.filter(v=>d.grupOf(v)===i).length; const b=document.createElement('button');
    b.className='chip'+(Q.selected.has(i)?' on':''); b.innerHTML=nama+'<span class="n">'+jml+'</span>';
    b.onclick=()=>{ Q.selected.has(i)?Q.selected.delete(i):Q.selected.add(i); renderKuis(); }; c.appendChild(b); });
  const n=qzJumlahSoal(), sb=$('qzStart'); sb.disabled=n===0; sb.textContent=n===0?'Pilih minimal satu grup':'Mulai kuis ('+n+' soal)';
  const best=getBest(Q.deckKey,Q.mode); const bl=$('qzBest');
  bl.innerHTML=best?('Rekor '+Q.mode+': <b>'+best.pct+'%</b>'+(best.mode==='ujian'?' · '+fmtTime(best.seconds*1000):'')):'Belum ada rekor untuk mode '+Q.mode;
}
function renderKuis(){
  if(Q.deckKey==null) Q.deckKey='verb';
  renderDeckButtons('qzDeckGrid',qzPilihDeck,Q.deckKey);
  $('qzSetup').classList.toggle('hidden',Q.view!=='setup');
  $('qzMain').classList.toggle('hidden',Q.view!=='main');
  $('qzDone').classList.toggle('hidden',Q.view!=='done');
  document.querySelectorAll('#qzModeNav button').forEach(b=>b.classList.toggle('active',b.dataset.m===Q.mode));
  document.querySelectorAll('#qzJenisNav button').forEach(b=>b.classList.toggle('active',b.dataset.j===Q.jenis));
  if(Q.view==='setup'){ qzRenderChips(); return; }
  if(Q.view==='main'){ renderSoal(); return; }
  if(Q.view==='done'){ renderDone(); return; }
}
function renderSoal(){
  const q=Q.questions[Q.idx], c=q.c;
  $('qzProg').textContent=(Q.idx+1)+'/'+Q.questions.length; $('qzScore').textContent=Q.correct;
  $('qzTimer').textContent=Q.mode==='ujian'?('⏱ '+fmtTime(Date.now()-Q.startTime)):'';
  const box=$('qzQ');
  if(q.type==='baca'){
    let h='<div class="qz-prompt"><div class="qz-tipe">Ketik cara baca</div><div class="qz-word jp">'+c.front+'</div></div>';
    if(!Q.answered){ h+='<input class="qz-input jp" id="qzIn" autocomplete="off" autocapitalize="off" placeholder="kana atau romaji">';
      h+='<button class="qz-cek" id="qzCek">Cek</button>'; }
    else { const ok=q._benar; h+='<div class="qz-fb '+(ok?'ok':'no')+'">'+(ok?'✓ Benar':'✗ Salah')+' — jawaban: <b class="jp">'+c.kana+'</b> ('+c.romaji+')'+(ok?'':'<br>Kamu: '+ (q._user||'(kosong)'))+'</div>';
      h+='<button class="qz-next" id="qzNext">Lanjut</button>'; }
    box.innerHTML=h;
    if(!Q.answered){ const inp=$('qzIn'); inp.focus();
      $('qzCek').onclick=()=>jawab(cekBaca(inp.value,c),inp.value);
      inp.onkeydown=e=>{ if(e.key==='Enter') jawab(cekBaca(inp.value,c),inp.value); }; }
    else $('qzNext').onclick=lanjut;
  } else {
    let h='<div class="qz-prompt"><div class="qz-tipe">Pilih arti</div><div class="qz-word jp">'+c.front+'<span class="r jp">'+c.kana+'</span></div></div>';
    h+='<div class="qz-opts">';
    q.options.forEach(opt=>{ let cls='qz-opt';
      if(Q.answered){ if(opt===c.arti)cls+=' ok'; else if(opt===q._user)cls+=' no'; }
      h+='<button class="'+cls+'" data-opt="'+encodeURIComponent(opt)+'"'+(Q.answered?' disabled':'')+'>'+opt+'</button>'; });
    h+='</div>';
    if(Q.answered) h+='<button class="qz-next" id="qzNext">Lanjut</button>';
    box.innerHTML=h;
    if(!Q.answered){ box.querySelectorAll('.qz-opt').forEach(b=>b.onclick=()=>{ const opt=decodeURIComponent(b.dataset.opt); jawab(opt===c.arti,opt); }); }
    else $('qzNext').onclick=lanjut;
  }
}
function renderDone(){
  const r=Q._hasil; let h='<div class="score-big">'+r.pct+'%</div>';
  h+='<div class="score-sub">Benar '+r.correct+' dari '+r.total+(r.mode==='ujian'?' · waktu '+fmtTime(r.seconds*1000):'')+'</div>';
  if(Q._rekorBaru) h+='<div class="rekor">🏆 Rekor baru!</div>';
  else if(Q._best) h+='<div class="score-sub" style="margin-top:6px">Rekor '+r.mode+': '+Q._best.pct+'%'+(Q._best.mode==='ujian'?' · '+fmtTime(Q._best.seconds*1000):'')+'</div>';
  if(Q.wrong.length){ h+='<div class="review"><h4>Perlu diulang ('+Q.wrong.length+')</h4>';
    Q.wrong.forEach(({q,userAns})=>{ const c=q.c; h+='<div class="item"><div class="w jp">'+c.front+' <span style="font-size:13px;color:var(--text3)">'+c.kana+'</span></div>';
      if(q.type==='baca') h+='<div>baca: <span class="c">'+c.romaji+'</span> · kamu: <span class="u">'+(userAns||'(kosong)')+'</span></div>';
      else h+='<div>arti: <span class="c">'+c.arti+'</span> · kamu: <span class="u">'+(userAns||'-')+'</span></div>'; h+='</div>'; }); h+='</div>'; }
  else h+='<div class="score-sub" style="margin-top:10px">Sempurna, tak ada yang salah 🎉</div>';
  h+='<div><button class="btn-main" id="qzUlang">Ulang</button><button class="btn-main" id="qzGanti">Ganti grup</button></div>';
  $('qzDone').innerHTML=h; $('qzUlang').onclick=mulaiKuis; $('qzGanti').onclick=()=>{ Q.view='setup'; renderKuis(); };
}
function qzPilihDeck(key){ Q.deckKey=key; const d=DECKS[key]; Q.selected=d.grups?new Set(d.grups.map((_,i)=>i)):new Set([0]); renderKuis(); }

/* ---------- EVENTS ---------- */
document.querySelectorAll('#modeNav button').forEach(b=> b.onclick=()=>{ S.mode=b.dataset.mode;
  document.querySelectorAll('#modeNav button').forEach(x=>x.classList.toggle('active',x===b)); render(); });
$('selAll').onclick=()=>{ S.selected=new Set((DECKS[S.deckKey].grups||[]).map((_,i)=>i)); render(); };
$('selNone').onclick=()=>{ S.selected=new Set(); render(); };
$('startBtn').onclick=()=>{ if(terpilih().length) mulaiSesi(); };
$('backBtn').onclick=()=>{ S.view='grup'; render(); };
$('backDone').onclick=()=>{ S.view='grup'; render(); };
$('restart').onclick=()=>mulaiSesi();
$('card').onclick=()=>{ if(S.view==='sesi'&&S.queue.length){ S.revealed=!S.revealed; render(); } };
document.querySelectorAll('#rateRow button').forEach(b=> b.onclick=()=>rate(b.dataset.lv));
$('gradBtn').onclick=keluarkan;
document.addEventListener('keydown',e=>{ if(S.mode!=='flash'||S.view!=='sesi'||!S.queue.length)return;
  if(e.code==='Space'){ e.preventDefault(); S.revealed=!S.revealed; render(); return; }
  if(S.revealed&&['1','2','3','4'].includes(e.key)) rate(['lupa','sulit','ingat','mudah'][+e.key-1]); });

document.querySelectorAll('#qzModeNav button').forEach(b=> b.onclick=()=>{ Q.mode=b.dataset.m; renderKuis(); });
document.querySelectorAll('#qzJenisNav button').forEach(b=> b.onclick=()=>{ Q.jenis=b.dataset.j; renderKuis(); });
$('qzSelAll').onclick=()=>{ Q.selected=new Set((DECKS[Q.deckKey].grups||[]).map((_,i)=>i)); renderKuis(); };
$('qzSelNone').onclick=()=>{ Q.selected=new Set(); renderKuis(); };
$('qzStart').onclick=mulaiKuis;
$('qzBack').onclick=()=>{ if(Q.timer){ clearInterval(Q.timer); Q.timer=null; } Q.view='setup'; renderKuis(); };

pilihDeck('verb');
Q.selected=new Set(ADEGAN.map((_,i)=>i));
</script>
